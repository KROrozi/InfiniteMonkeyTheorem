<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Stream Typing Game - Monkey Edition</title>
    <style>
        /* 기본 UI 설정 */
        body {
            margin: 0;
            background-color: #050505;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            color: #ffffff;
        }

        /* 1. 우측 상단 바나나 이미지 버튼 및 배지 스타일 */
        #popup-btn-container {
            position: fixed;
            top: 20px;
            right: 20px;
            cursor: pointer;
            display: inline-block;
            z-index: 2;
        }
        #banana-img {
            width: 50px; /* 바나나 이미지 크기 조정 */
            height: auto;
            display: block;
            transition: transform 0.1s ease;
        }
        #banana-img:hover {
            transform: scale(1.1); /* 마우스 올리면 살짝 커짐 */
        }
        #word-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background-color: #ff3366; /* 쨍한 핑크색 배지 */
            color: white;
            font-size: 0.8rem;
            font-weight: bold;
            border-radius: 50%;
            padding: 4px 8px;
            min-width: 15px;
            text-align: center;
            font-family: sans-serif;
        }

        /* 2. 게임 텍스트 창 (한 줄 스트림) */
        #game-window {
            width: 100vw;
            height: 100px;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            margin-top: 50px;
        }
        #game-container {
            white-space: nowrap;
            position: absolute;
            left: 50vw; 
            transform: translateX(0px);
            transition: transform 0.08s ease-out;
        }
        .char-span {
            display: inline-block;
            width: 45px; 
            font-size: 3.5rem;
            font-weight: bold;
            color: #444; 
            text-align: center;
            transition: color 0.08s ease-in-out;
        }

        /* 3. 하단 원숭이 이미지 영역 */
        #monkey-container {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #monkey-img {
            width: 180px; /* 원숭이 이미지 크기 (원하는 대로 조절 가능) */
            height: auto;
            image-rendering: pixelated; /* 만약 도트 패스라면 깔끔하게 출력되도록 */
            user-select: none;
        }

        /* 4. 팝업창(모달) 스타일 */
        #word-modal {
            display: none; 
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 300px; max-height: 400px;
            background-color: #111;
            border: 1px solid #333;
            padding: 20px;
            box-shadow: 0 0 20px rgba(255,255,255,0.05);
            z-index: 10;
        }
        #modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        #modal-title { margin: 0; font-size: 1.2rem; color: #fff; }
        #close-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 1.2rem; }
        #close-btn:hover { color: #fff; }
        #word-list {
            list-style: none; padding: 0; margin: 0;
            max-height: 300px; overflow-y: auto;
        }
        #word-list li {
            padding: 8px 0; border-bottom: 1px solid #222;
            font-size: 1.2rem; font-weight: bold;
        }
        #modal-overlay {
            display: none; position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.7); z-index: 5;
        }
    </style>
</head>
<body>

    <div id="popup-btn-container">
        <img id="banana-img" src="banana.png" alt="Words Bucket">
        <div id="word-badge">0</div>
    </div>

    <div id="game-window">
        <div id="game-container"></div>
    </div>

    <div id="monkey-container">
        <img id="monkey-img" src="monkeystop.png" alt="Typing Monkey">
    </div>

    <div id="modal-overlay"></div>
    <div id="word-modal">
        <div id="modal-header">
            <h3 id="modal-title">Collected Words</h3>
            <button id="close-btn">&times;</button>
        </div>
        <ul id="word-list"></ul>
    </div>

    <script>
        // 사전 데이터베이스
        const wordsString = "ability,able,about,above,accept,according,account,across,action,activity,actually,address,administration,admit,adult,affect,after,again,against,agency,agent,agree,agreement,ahead,allow,almost,alone,along,already,also,although,always,american,among,amount,analysis,animal,another,answer,anyone,anything,appear,apply,approach,area,argue,around,arrive,article,artist,assume,attack,attention,attorney,audience,author,authority,available,avoid,away,baby,back,blood,board,body,book,born,both,break,bring,brother,budget,build,building,business,call,camera,campaign,cancer,candidate,capital,care,career,carry,case,catch,cause,cell,center,central,century,certain,certainly,chair,challenge,chance,change,character,charge,check,child,choice,choose,church,citizen,city,civil,claim,class,clear,clearly,close,coach,cold,collection,college,color,come,commercial,common,community,company,compare,computer,concern,condition,conference,congress,consider,consumer,contain,continue,control,cost,could,country,couple,course,court,cover,create,crime,cultural,culture,current,customer,dark,data,daughter,dead,deal,death,debate,decade,decide,decision,deep,defense,degree,democrat,democratic,describe,design,despite,detail,determine,develop,development,die,difference,different,difficult,dinner,direction,director,discover,discuss,discussion,disease,doctor,door,down,draw,dream,drive,drop,drug,during,each,early,east,easy,edge,education,effect,effort,eight,either,election,else,employee,energy,enjoy,enough,enter,entire,environment,especially,establish,even,evening,event,ever,every,everybody,everyone,everything,evidence,exactly,example,executive,exist,expect,experience,expert,explain,factor,fail,fall,family,fast,father,fear,federal,feel,feeling,field,fight,figure,fill,film,final,finally,financial,find,fine,finger,finish,fire,firm,first,fish,five,floor,focus,follow,food,foot,force,foreign,forget,form,former,forward,four,free,friend,from,front,full,fund,future,game,garden,gas,general,generation,girl,give,glass,goal,good,government,great,green,ground,group,grow,growth,guess,hair,half,hand,hang,happen,happy,hard,have,head,health,hear,heart,heat,heavy,help,here,herself,high,himself,history,hold,hole,home,hope,hospital,hotel,hour,house,huge,human,hundred,husband,idea,identify,image,imagine,impact,important,improve,include,including,increase,indeed,indicate,individual,industry,information,inside,instead,institution,interest,interesting,international,interview,into,investment,involve,issue,item,join,just,keep,kill,kind,know,knowledge,land,language,large,last,late,later,laugh,lawyer,lead,leader,learning,least,leave,left,legal,less,letter,level,life,light,like,likely,line,list,listen,little,live,local,long,look,lose,loss,love,machine,magazine,main,maintain,major,majority,make,manage,management,manager,many,market,marriage,material,matter,maybe,mean,measure,media,medical,meet,meeting,member,memory,mention,message,method,middle,might,military,million,mind,minute,miss,mission,model,modern,moment,money,month,more,morning,most,mother,mouth,move,movement,movie,much,music,must,myself,name,nation,national,natural,nature,near,nearly,necessary,need,network,never,news,newspaper,next,nice,night,none,north,note,nothing,notice,number,occur,ocean,offer,office,officer,official,often,once,only,onto,open,operation,opportunity,option,order,organization,other,others,outside,over,owner,page,pain,painting,paper,parent,part,participant,particular,particularly,partner,party,pass,past,patient,pattern,peace,people,perform,performance,perhaps,period,person,personal,phone,physical,pick,picture,piece,place,plan,plant,play,player,point,police,policy,political,politics,poor,popular,population,position,positive,possible,power,practice,prepare,present,president,pressure,price,private,probably,problem,process,produce,product,production,professional,professor,program,project,property,protect,prove,provide,public,pull,purpose,push,quality,question,quickly,quite,race,radio,raise,range,rate,rath el,coding,logic,function,variable,string,array,object,class,method,error,debug,release,version,update,patch,click,scroll,touch,swipe,zoom,upload,download,search,engine,link,domain,cloud,mobile,battery,photo,video,audio,rhythm,beat,tempo,melody,harmony,chord,vocal,guitar,piano,drum,bass,synth,concert,ticket,crowd,album,track,record,vinyl,studio,microphone,speaker,headphone,broadcast,podcast,stream,live,channel,episode,season,series,actor,actress,director,script,plot,scene,drama,comedy,action,horror,thriller,romance,fantasy,scifi,animation,cartoon,comic,novel,poem,poet,chapter,character,hero,villain,magic,sword,shield,dragon,knight,castle,king,queen,prince,princess,royal,crown,throne,gold,silver,bronze,iron,steel,wood,stone,dirt,sand,plastic,cloth,fabric,cotton,silk,wool,leather,shoe,boot,sock,shirt,pant,dress,skirt,coat,jacket,glove,ring,clock,decade,past,present,future,tomorrow,yesterday,noon,afternoon,midnight,dawn,dusk,moon,planet,earth,mars,jupiter,saturn,galaxy,universe,astronaut,rocket,ship,alien,orbit,gravity,speed,light,color,yellow,purple,pink,brown,black,gray,shape,circle,square,triangle,line,point,volume,mass,tall,short,narrow,deep,shallow,high,cold,warm,cool,hard,soft,rough,smooth,heavy,fast,slow,quick,steady,weak,brave,scared,angry,calm,loud,quiet,deaf,blind,mute,dumb,smart,clever,wise,fool,crazy,sane,sick,awake,sleep,dream,nightmare,pillow,blanket,roof,floor,kitchen,bath,living,dining,yard,grass,leaf,branch,root,flower,seed,fruit,vegetable,meat,beef,pork,bread,cheese,milk,butter,salt,pepper,sugar,spice,sweet,sour,bitter,spicy,taste,smell,sight,sense,brain,lung,stomach,liver,kidney,bone,muscle,nail,face,nose,lip,tooth,tongue,neck,arm,thumb,chest,waist,knee,foot";
        const dictionary = wordsString.split(",").filter(word => word.length >= 3);

        const flatNeonColors = ['#FF3366', '#33FFCC', '#33CCFF', '#CCFF33', '#FF9933', '#FF33FF'];

        const container = document.getElementById("game-container");
        const popupBtnContainer = document.getElementById("popup-btn-container");
        const wordBadge = document.getElementById("word-badge");
        const modal = document.getElementById("word-modal");
        const overlay = document.getElementById("modal-overlay");
        const closeBtn = document.getElementById("close-btn");
        const wordListElement = document.getElementById("word-list");
        const monkeyImg = document.getElementById("monkey-img");

        let charsData = []; 
        let currentIndex = 0; 
        let collectedWords = []; 
        const charWidth = 45;    

        // 🐒 원숭이 애니메이션 제어 변수들
        let currentFrame = 0;
        let monkeyTimer = null;

        // 글자 스트림 생성
        function appendStream(count) {
            let i = 0;
            while (i < count) {
                if (Math.random() < 0.15) {
                    let word = dictionary[Math.floor(Math.random() * dictionary.length)];
                    for (let char of word) {
                        createSpan(char);
                    }
                    i += word.length;
                    continue;
                }
                let randomChar = String.fromCharCode(97 + Math.floor(Math.random() * 26));
                createSpan(randomChar);
                i++;
            }
        }

        function createSpan(char) {
            let span = document.createElement("span");
            span.innerText = char;
            span.className = "char-span";
            container.appendChild(span);
            
            charsData.push({
                char: char,
                element: span,
                colorOverridden: false 
            });
        }

        // 단어 획득 시 처리 (배지 숫자 업데이트)
        function collectWord(word, color) {
            collectedWords.push(word);
            wordBadge.innerText = collectedWords.length; // 배지 숫자 갱신
            
            const li = document.createElement("li");
            li.innerText = word;
            li.style.color = color; 
            wordListElement.appendChild(li);
        }

        // 키보드 입력 이벤트
        window.addEventListener("keydown", (e) => {
            if (modal.style.display === "block" || currentIndex >= charsData.length) return; 
            if (e.key.length > 1) return; 

            const key = e.key.toLowerCase();
            
            if (key === charsData[currentIndex].char) {
                let currentData = charsData[currentIndex];
                
                if (!currentData.colorOverridden) {
                    currentData.element.style.color = '#ffffff'; 
                }
                
                currentIndex++;
                container.style.transform = `translateX(${-currentIndex * charWidth}px)`;

                // 🐒 원숭이 타자 프레임 애니메이션 처리
                clearTimeout(monkeyTimer); // 대기 상태 복귀 타이머 초기화
                
                currentFrame = (currentFrame % 4) + 1; // 1 -> 2 -> 3 -> 4 -> 1 반복
                monkeyImg.src = `monkeytypo${currentFrame}.png`; // 깃헙 패스로 변환될 부분

                // 타자를 멈추고 250ms가 지나면 가만히 있는 이미지로 복귀
                monkeyTimer = setTimeout(() => {
                    monkeyImg.src = "monkeystop.png";
                    currentFrame = 0; // 프레임 초기화
                }, 250);

                // 무한 스트림 채우기
                if (charsData.length - currentIndex < 40) {
                    appendStream(100);
                }
                
                // 단어 매칭 체크
                for (let word of dictionary) {
                    let len = word.length;
                    
                    if (currentIndex >= len) {
                        let match = true;
                        for (let j = 0; j < len; j++) {
                            if (charsData[currentIndex - len + j].char !== word[j]) {
                                match = false;
                                break;
                            }
                        }
                        
                        if (match) {
                            let chosenColor = flatNeonColors[Math.floor(Math.random() * flatNeonColors.length)];
                            
                            for (let j = 0; j < len; j++) {
                                let targetData = charsData[currentIndex - len + j];
                                targetData.element.style.color = chosenColor;
                                targetData.colorOverridden = true; 
                            }
                            
                            collectWord(word, chosenColor);
                            break; 
                        }
                    }
                }
            }
        });

        /* 팝업 모달 이벤트 */
        popupBtnContainer.addEventListener("click", () => {
            modal.style.display = "block";
            overlay.style.display = "block";
        });

        function closeModal() {
            modal.style.display = "none";
            overlay.style.display = "none";
        }
        closeBtn.addEventListener("click", closeModal);
        overlay.addEventListener("click", closeModal);

        appendStream(100);
    </script>
</body>
</html>
