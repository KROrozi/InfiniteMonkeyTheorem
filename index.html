<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Stream Typing Game - SeaMonkeys Expansion</title>
    <style>
        /* 기본 UI 설정 */
        body {
            margin: 0;
            background-color: #050505;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            color: #ffffff;
        }

        /* 1. 우측 상단 UI 버튼 그룹 */
        #ui-top-container {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 20px;
            z-index: 10;
        }
        .bucket-btn-wrapper {
            position: relative;
            cursor: pointer;
        }
        .bucket-btn-wrapper img {
            width: 50px; 
            height: auto;
            display: block;
            transition: transform 0.1s ease;
        }
        .bucket-btn-wrapper img:hover {
            transform: scale(1.1); 
        }
        .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            color: white;
            font-size: 0.8rem;
            font-weight: bold;
            border-radius: 50%;
            padding: 4px 8px;
            min-width: 15px;
            text-align: center;
            font-family: sans-serif;
        }
        #word-badge { background-color: #ff3366; }
        #ee-badge { background-color: #ffd700; color: #000; } 

        /* 2. 게임 텍스트 창 (한 줄 스트림) */
        #game-window {
            width: 100vw;
            height: 100px;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            margin-top: 50px;
        }
        #game-container {
            white-space: nowrap;
            position: absolute;
            left: 50vw; 
            transform: translateX(0px);
            transition: transform 0.08s ease-out;
        }
        .char-span {
            display: inline-block;
            width: 45px; 
            font-size: 3.5rem;
            font-weight: bold;
            color: #444; 
            text-align: center;
            transition: color 0.08s ease-in-out;
        }

        /* 3. 하단 원숭이 이미지 영역 */
        #monkey-container {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #monkey-img {
            width: 360px;         
            height: 360px;        
            object-fit: contain;  
            image-rendering: pixelated; 
            user-select: none;
        }

        /* 4. 중력 낙하 기본 바나나 오브젝트 */
        .flying-banana {
            position: fixed;
            z-index: 100;
            pointer-events: none;
            image-rendering: pixelated;
            animation: tossAndFall 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }
        @keyframes tossAndFall {
            0% { left: 50%; top: 60vh; transform: translate(-50%, -50%) rotate(0deg); }
            30% { top: var(--peak-y); }
            100% { top: 120vh; left: var(--target-x); transform: translate(-50%, -50%) rotate(var(--target-rot)); }
        }

        /* ========================================================
           ✨ 이스터에그 연출용 CSS 애니메이션 영역
        ======================================================== */
        
        /* [bppc 연출] 직선 돌격 */
        .ee-bppc-flying {
            position: fixed;
            width: 550px; height: 550px;
            object-fit: contain;
            z-index: 99;
            pointer-events: none;
            animation: bppcLinearLeft 2.2s linear forwards;
        }
        @keyframes bppcLinearLeft {
            0% { left: 105vw; transform: translateY(-50%); }
            100% { left: -600px; transform: translateY(-50%); }
        }

        /* [spoon 연출] 양방향 수평 교차 */
        .ee-spoon-asset {
            position: fixed;
            width: 520px; height: 520px;
            object-fit: contain;
            z-index: 99;
            pointer-events: none;
            top: 50vh;
        }
        .ee-spoon-left { animation: spoonCrossLeft 3.5s ease-in-out forwards; }
        @keyframes spoonCrossLeft {
            0%   { left: -600px; transform: translateY(-50%); }
            25%  { left: 35vw;   transform: translateY(-50%); }
            45%  { left: 20vw;   transform: translateY(-50%); }
            65%  { left: 40vw;   transform: translateY(-50%); }
            100% { left: 105vw;  transform: translateY(-50%); }
        }
        .ee-spoon-right { animation: spoonCrossRight 3.5s ease-in-out forwards; }
        @keyframes spoonCrossRight {
            0%   { left: 105vw;  transform: translateY(-50%) scaleX(-1); }
            25%  { left: 50vw;   transform: translateY(-50%) scaleX(-1); }
            45%  { left: 65vw;   transform: translateY(-50%) scaleX(-1); }
            65%  { left: 45vw;   transform: translateY(-50%) scaleX(-1); }
            100% { left: -600px; transform: translateY(-50%) scaleX(-1); }
        }

        /* [dokkae 연출] 사방 모서리 습격 후 중간 지점 흔들기 */
        .ee-dokkae-asset {
            position: fixed;
            width: 500px; height: 500px;
            object-fit: contain;
            z-index: 99;
            pointer-events: none;
        }
        .ee-dokkae-tl { animation: dokkaeTL 4.0s ease-in-out forwards; }
        .ee-dokkae-tr { animation: dokkaeTR 4.0s ease-in-out forwards; }
        .ee-dokkae-bl { animation: dokkaeBL 4.0s ease-in-out forwards; }
        .ee-dokkae-br { animation: dokkaeBR 4.0s ease-in-out forwards; }

        @keyframes dokkaeTL {
            0%   { top: -600px; left: -600px; }
            20%  { top: 10vh; left: 10vw; transform: translateX(0); }
            30%  { top: 10vh; left: 10vw; transform: translateX(-25px); }
            40%  { top: 10vh; left: 10vw; transform: translateX(25px); }
            50%  { top: 10vh; left: 10vw; transform: translateX(-25px); }
            60%  { top: 10vh; left: 10vw; transform: translateX(25px); }
            75%  { top: 10vh; left: 10vw; transform: translateX(0); }
            100% { top: -600px; left: -600px; }
        }
        @keyframes dokkaeTR {
            0%   { top: -600px; right: -600px; }
            20%  { top: 10vh; right: 10vw; transform: translateX(0); }
            30%  { top: 10vh; right: 10vw; transform: translateX(-25px); }
            40%  { top: 10vh; right: 10vw; transform: translateX(25px); }
            50%  { top: 10vh; right: 10vw; transform: translateX(-25px); }
            60%  { top: 10vh; right: 10vw; transform: translateX(25px); }
            75%  { top: 10vh; right: 10vw; transform: translateX(0); }
            100% { top: -600px; right: -600px; }
        }
        @keyframes dokkaeBL {
            0%   { bottom: -600px; left: -600px; }
            20%  { bottom: 10vh; left: 10vw; transform: translateX(0); }
            30%  { bottom: 10vh; left: 10vw; transform: translateX(-25px); }
            40%  { bottom: 10vh; left: 10vw; transform: translateX(25px); }
            50%  { bottom: 10vh; left: 10vw; transform: translateX(-25px); }
            60%  { bottom: 10vh; left: 10vw; transform: translateX(25px); }
            75%  { bottom: 10vh; left: 10vw; transform: translateX(0); }
            100% { bottom: -600px; left: -600px; }
        }
        @keyframes dokkaeBR {
            0%   { bottom: -600px; right: -600px; }
            20%  { bottom: 10vh; right: 10vw; transform: translateX(0); }
            30%  { bottom: 10vh; right: 10vw; transform: translateX(-25px); }
            40%  { bottom: 10vh; right: 10vw; transform: translateX(25px); }
            50%  { bottom: 10vh; right: 10vw; transform: translateX(-25px); }
            60%  { bottom: 10vh; right: 10vw; transform: translateX(25px); }
            75%  { bottom: 10vh; right: 10vw; transform: translateX(0); }
            100% { bottom: -600px; right: -600px; }
        }

        /* 🌊 [seamonkeys 연출] 1920px 해상도 전체 커버 바운스 댄스 모션 */
        .ee-seamonkeys-asset {
            position: fixed;
            width: 1920px; 
            height: auto;
            left: 50%;
            z-index: 99;
            pointer-events: none;
            animation: seamonkeysMotion 4.8s ease-in-out forwards;
        }
        @keyframes seamonkeysMotion {
            0%   { top: 150vh; transform: translate(-50%, -50%); }
            25%  { top: 70vh;  transform: translate(-50%, -50%); } /* 화면 정중앙 솟구치기 */
            42%  { top: 55vh;  transform: translate(-50%, -50%); } /* 위로 무빙 */
            58%  { top: 75vh;  transform: translate(-50%, -50%); } /* 아래로 무빙 */
            75%  { top: 70vh;  transform: translate(-50%, -50%); } /* 다시 중앙 정렬 */
            100% { top: 150vh; transform: translate(-50%, -50%); } /* 바닥 아래로 완전 퇴장 */
        }

        /* 5. 팝업창(모달) 스타일 */
        .modal-window {
            display: none; 
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 320px; max-height: 400px;
            background-color: #111;
            border: 1px solid #333;
            padding: 20px;
            box-shadow: 0 0 20px rgba(255,255,255,0.05);
            z-index: 20;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .modal-header h3 { margin: 0; font-size: 1.2rem; color: #fff; }
        .close-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 1.2rem; }
        .close-btn:hover { color: #fff; }
        .word-list-ul {
            list-style: none; padding: 0; margin: 0;
            max-height: 300px; overflow-y: auto;
        }
        .word-list-ul li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0; border-bottom: 1px solid #222;
            font-size: 1.2rem; font-weight: bold;
        }
        
        .list-ee-click-icon {
            width: 36px; height: 36px;
            object-fit: contain;
            margin-left: 10px;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        .list-ee-click-icon:hover {
            transform: scale(1.2);
        }

        #modal-overlay {
            display: none; position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.7); z-index: 15;
        }
    </style>
</head>
<body>

    <div id="ui-top-container">
        <div id="banana-btn-wrapper" class="bucket-btn-wrapper">
            <img src="image/banana.png" alt="Normal Words Bucket">
            <div id="word-badge" class="badge">0</div>
        </div>
        <div id="egg-btn-wrapper" class="bucket-btn-wrapper">

    <div id="game-window">

    <div id="modal-overlay"></div>

    <div id="banana-modal" class="modal-window">
        <div class="modal-header">
            <h3>Collected Words</h3>

        <ul id="banana-word-list" class="word-list-ul"></ul>

            <button id="egg-close-btn" class="close-btn">&times;</button>

    </div>

    <script>

er,reach,read,ready,real,reality,realize,really,reason,receive,recent,recently,recognize,record,reduce,reflect,region,relate,relationship,religious,remain,remember,remove,report,represent,republican,require,research,resource,respond,response,responsibility,rest,result,return,reveal,rich,right,rise,risk,road,rock,role,room,rule,safe,same,save,scene,school,science,scientist,score,season,seat,second,section,security,seek,seem,sell,send,senior,sense,series,serious,serve,service,set,seven,several,sexual,shake,share,shoot,short,shot,should,shoulder,show,side,sign,significant,similar,simple,simply,since,sing,single,sister,site,situation,size,skill,skin,small,smile,social,society,soldier,some,somebody,someone,something,sometimes,song,soon,sort,sound,source,south,southern,space,speak,special,specific,speech,spend,sport,spring,staff,stage,stand,standard,star,start,state,statement,station,stay,step,still,stock,stop,store,story,strategy,street,strong,structure,student,study,stuff,style,subject,success,successful,such,suddenly,suffer,suggest,summer,support,sure,surface,system,table,take,talk,task,team,technology,television,tell,term,test,than,that,their,them,themselves,then,theory,there,these,they,thing,think,third,this,those,though,thought,thousand,threat,three,through,throughout,throw,thus,time,today,together,tonight,total,tough,toward,town,trade,traditional,training,travel,treat,treatment,tree,trial,trip,trouble,true,truth,turn,type,under,understand,unit,until,upon,usually,value,various,very,victim,view,violence,visit,voice,vote,wait,walk,wall,want,warm,warn,wash,watch,water,wave,weapon,wear,week,weight,well,west,western,whatever,when,where,whether,which,while,white,whole,whom,whose,wide,wife,will,wind,window,wish,with,within,without,woman,wonder,word,work,worker,world,worry,would,write,writer,wrong,yard,yeah,year,young,your,yourself,apple,banana,orange,grape,strawberry,keyboard,mouse,monitor,laptop,screen,software,hardware,internet,website,browser,server,database,network,pixel,coding,logic,function,variable,string,array,object,class,method,error,debug,release,version,update,patch,click,scroll,touch,swipe,zoom,upload,download,search,engine,link,domain,cloud,mobile,battery,photo,video,audio,rhythm,beat,tempo,melody,harmony,chord,vocal,guitar,piano,drum,bass,synth,concert,ticket,crowd,album,track,record,vinyl,studio,microphone,speaker,headphone,broadcast,podcast,stream,live,channel,episode,season,series,actor,actress,director,script,plot,scene,drama,comedy,action,horror,thriller,romance,fantasy,scifi,animation,cartoon,comic,novel,poem,poet,chapter,character,hero,villain,magic,sword,shield,dragon,knight,castle,king,queen,prince,princess,royal,crown,throne,gold,silver,bronze,iron,steel,wood,stone,dirt,sand,plastic,cloth,fabric,cotton,silk,wool,leather,shoe,boot,sock,shirt,pant,dress,skirt,coat,jacket,glove,ring,clock,decade,past,present,future,tomorrow,yesterday,noon,afternoon,midnight,dawn,dusk,moon,planet,earth,mars,jupiter,saturn,galaxy,universe,astronaut,rocket,ship,alien,orbit,gravity,speed,light,color,yellow,purple,pink,brown,black,gray,shape,circle,square,triangle,line,point,volume,mass,tall,short,narrow,deep,shallow,high,cold,warm,cool,hard,soft,rough,smooth,heavy,fast,slow,quick,steady,weak,brave,scared,angry,calm,loud,quiet,deaf,blind,mute,dumb,smart,clever,wise,fool,crazy,sane,sick,awake,sleep,dream,nightmare,pillow,blanket,roof,floor,kitchen,bath,living,dining,yard,grass,leaf,branch,root,flower,seed,fruit,vegetable,meat,beef,pork,bread,cheese,milk,butter,salt,pepper,sugar,spice,sweet,sour,bitter,spicy,taste,smell,sight,sense,brain,lung,stomach,liver,kidney,bone,muscle,nail,face,nose,lip,tooth,tongue,neck,arm,thumb,chest,waist,knee,foot";
        const dictionary = wordsString.split(",").filter(word => word.length >= 3);

        // 📌 이스터에그 데이터베이스 (seamonkeys 최신 탑재)
        const easterEggs = {
            "bppc": { img: "image/bppcimg.png", color: "#00FF66" },
            "spoon": { img: "image/spoonimg.png", color: "#FF00FF" },
            "dokkae": { img: "image/dokkaeimg.png", color: "#FF3333" },
            "seamonkeys": { img: "image/seamonkeysimg.png", color: "#33CCFF" } // 🌊 청량한 네온 아쿠아 블루 블루
        };

        const flatNeonColors = ['#FF3366', '#33FFCC', '#33CCFF', '#CCFF33', '#FF9933', '#FF33FF'];

        const container = document.getElementById("game-container");
        const bananaBtn = document.getElementById("banana-btn-wrapper");
        const eggBtn = document.getElementById("egg-btn-wrapper");
        
        const wordBadge = document.getElementById("word-badge");
        const eeBadge = document.getElementById("ee-badge");
        
        const bananaModal = document.getElementById("banana-modal");
        const eggModal = document.getElementById("egg-modal");
        const overlay = document.getElementById("modal-overlay");
        
        const bananaCloseBtn = document.getElementById("banana-close-btn");
        const eggCloseBtn = document.getElementById("egg-close-btn");
        
        const bananaWordList = document.getElementById("banana-word-list");
        const eggWordList = document.getElementById("egg-word-list");
        const monkeyImg = document.getElementById("monkey-img");

        let charsData = []; 
        let currentIndex = 0; 
        
        let collectedWords = []; 
        let collectedEE = [];    

        const charWidth = 45;    
        let currentFrame = 0;
        let monkeyTimer = null;

        let nextEeTriggerCount = Math.floor(Math.random() * 51) + 100; 
        let charCounterSinceLastEe = 0;

        function appendStream(count) {
            let i = 0;
            while (i < count) {
                if (charCounterSinceLastEe >= nextEeTriggerCount) {
                    const eeKeys = Object.keys(easterEggs);
                    const randomEe = eeKeys[Math.floor(Math.random() * eeKeys.length)];
                    for (let char of randomEe) { createSpan(char); }
                    i += randomEe.length;
                    charCounterSinceLastEe = 0;
                    nextEeTriggerCount = Math.floor(Math.random() * 51) + 100; 
                    continue;
                }
                if (Math.random() < 0.15) {
                    let word = dictionary[Math.floor(Math.random() * dictionary.length)];
                    for (let char of word) { createSpan(char); }
                    i += word.length;
                    charCounterSinceLastEe += word.length;
                    continue;
                }
                let randomChar = String.fromCharCode(97 + Math.floor(Math.random() * 26));
                createSpan(randomChar);
                i++;
                charCounterSinceLastEe++;
            }
        }

        function createSpan(char) {
            let span = document.createElement("span");
            span.innerText = char;
            span.className = "char-span";
            container.appendChild(span);
            charsData.push({ char: char, element: span, colorOverridden: false });
        }

        function launchBanana(wordLength) {
            const flyingBanana = document.createElement("img");
            flyingBanana.src = "image/banana.png";
            flyingBanana.className = "flying-banana";
            const bananaSize = 35 + (wordLength * 12); 
            flyingBanana.style.width = `${bananaSize}px`;
            flyingBanana.style.height = "auto";
            
            const targetX = 15 + Math.random() * 70; 
            const peakY = 25 + Math.random() * 15; 
            const targetRot = (Math.random() - 0.5) * 1440; 

            flyingBanana.style.setProperty('--target-x', `${targetX}vw`);
            flyingBanana.style.setProperty('--peak-y', `${peakY}vh`);
            flyingBanana.style.setProperty('--target-rot', `${targetRot}deg`);

            document.body.appendChild(flyingBanana);
            setTimeout(() => { flyingBanana.remove(); }, 1200);
        }

        // ========================================================
        // 🎬 이스터에그 애니메이션 구동 엔진 (seamonkeys 수용 완료)
        // ========================================================
        function triggerEasterEggInteraction(word) {
            if (word === "bppc") {
                const spawnCount = 7 + Math.floor(Math.random() * 2); 
                for (let k = 0; k < spawnCount; k++) {
                    setTimeout(() => {
                        const img = document.createElement("img");
                        img.src = easterEggs["bppc"].img;
                        img.className = "ee-bppc-flying";
                        img.style.top = `${15 + Math.random() * 60}vh`;
                        document.body.appendChild(img);
                        setTimeout(() => img.remove(), 2200); 
                    }, k * 180); 
                }
            } 
            else if (word === "spoon") {
                const spoonL = document.createElement("img");
                spoonL.src = easterEggs["spoon"].img;
                spoonL.className = "ee-spoon-asset ee-spoon-left";
                document.body.appendChild(spoonL);

                const spoonR = document.createElement("img");
                spoonR.src = easterEggs["spoon"].img;
                spoonR.className = "ee-spoon-asset ee-spoon-right";
                document.body.appendChild(spoonR);

                setTimeout(() => {
                    spoonL.remove();
                    spoonR.remove();
                }, 3500);
            }
            else if (word === "dokkae") {
                const corners = ['tl', 'tr', 'bl', 'br'];
                const spawnedElements = [];

                corners.forEach(corner => {
                    const img = document.createElement("img");
                    img.src = easterEggs["dokkae"].img;
                    img.className = `ee-dokkae-asset ee-dokkae-${corner}`;
                    document.body.appendChild(img);
                    spawnedElements.push(img);
                });

                setTimeout(() => {
                    spawnedElements.forEach(el => el.remove());
                }, 4000);
            }
            else if (word === "seamonkeys") {
                // 🌊 1920px 초대형 바다원숭이 맵 스폰
                const img = document.createElement("img");
                img.src = easterEggs["seamonkeys"].img;
                img.className = "ee-seamonkeys-asset";
                document.body.appendChild(img);

                // 애니메이션(4.8초) 동안 위아래 바운싱을 마친 후 화면 바닥으로 사라지면 제거
                setTimeout(() => {
                    img.remove();
                }, 4800);
            }
        }

        function collectNormalWord(word, color) {
            collectedWords.push({ name: word, color: color });
            wordBadge.innerText = collectedWords.length; 
            
            const li = document.createElement("li");
            li.style.color = color;
            li.innerText = word;
            bananaWordList.appendChild(li);
        }

        function collectEasterEgg(word, color) {
            if (!collectedEE.includes(word)) {
                collectedEE.push(word);
                eeBadge.innerText = collectedEE.length;

                const li = document.createElement("li");
                li.style.color = color;

                const textSpan = document.createElement("span");
                textSpan.innerText = word;
                li.appendChild(textSpan);

                const replayImg = document.createElement("img");
                replayImg.src = easterEggs[word].img;
                replayImg.className = "list-ee-click-icon";
                replayImg.title = "Click to replay animation!";
                
                replayImg.addEventListener("click", () => {
                    triggerEasterEggInteraction(word);
                });

                li.appendChild(replayImg);
                eggWordList.appendChild(li);
            }
        }

        window.addEventListener("keydown", (e) => {
            if (bananaModal.style.display === "block" || eggModal.style.display === "block" || currentIndex >= charsData.length) return; 
            if (e.key.length > 1) return; 

            const key = e.key.toLowerCase();
            
            if (key === charsData[currentIndex].char) {
                let currentData = charsData[currentIndex];
                if (!currentData.colorOverridden) {
                    currentData.element.style.color = '#ffffff'; 
                }
                
                currentIndex++;
                container.style.transform = `translateX(${-currentIndex * charWidth}px)`;

                clearTimeout(monkeyTimer); 
                currentFrame = (currentFrame % 4) + 1; 
                monkeyImg.src = `image/monkeytypo${currentFrame}.png`; 

                monkeyTimer = setTimeout(() => {
                    monkeyImg.src = "image/monkeystop.png";
                    currentFrame = 0; 
                }, 250);

                if (charsData.length - currentIndex < 40) {
                    appendStream(100);
                }
                
                let eeFound = false;
                for (let eeWord in easterEggs) {
                    let len = eeWord.length;
                    if (currentIndex >= len) {
                        let match = true;
                        for (let j = 0; j < len; j++) {
                            if (charsData[currentIndex - len + j].char !== eeWord[j]) {
                                match = false;
                                break;
                            }
                        }
                        if (match) {
                            let chosenColor = easterEggs[eeWord].color;
                            for (let j = 0; j < len; j++) {
                                let targetData = charsData[currentIndex - len + j];
                                targetData.element.style.color = chosenColor;
                                targetData.colorOverridden = true; 
                            }
                            
                            triggerEasterEggInteraction(eeWord);
                            launchBanana(len); 
                            collectEasterEgg(eeWord, chosenColor); 
                            eeFound = true;
                            break;
                        }
                    }
                }

                if (!eeFound) {
                    for (let word of dictionary) {
                        let len = word.length;
                        if (currentIndex >= len) {
                            let match = true;
                            for (let j = 0; j < len; j++) {
                                if (charsData[currentIndex - len + j].char !== word[j]) {
                                    match = false;
                                    break;
                                }
                            }
                            if (match) {
                                let chosenColor = flatNeonColors[Math.floor(Math.random() * flatNeonColors.length)];
                                for (let j = 0; j < len; j++) {
                                    let targetData = charsData[currentIndex - len + j];
                                    targetData.element.style.color = chosenColor;
                                    targetData.colorOverridden = true; 
                                }
                                launchBanana(len);
                                collectNormalWord(word, chosenColor);
                                break; 
                            }
                        }
                    }
                }
            }
        });

        bananaBtn.addEventListener("click", () => {
            bananaModal.style.display = "block";
            overlay.style.display = "block";
        });

        eggBtn.addEventListener("click", () => {
            eggModal.style.display = "block";
            overlay.style.display = "block";
        });

        function closeModal() {
            bananaModal.style.display = "none";
            eggModal.style.display = "none";
            overlay.style.display = "none";
        }
        
        bananaCloseBtn.addEventListener("click", closeModal);
        eggCloseBtn.addEventListener("click", closeModal);
        overlay.addEventListener("click", closeModal);

        appendStream(100);
    </script>
</body>
</html>
