<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Stream Typing Game - Mega Easter Egg Edition</title>
    <style>
        /* 기본 UI 설정 */
        body {
            margin: 0;
            background-color: #050505;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            color: #ffffff;
        }

        /* 1. 우측 상단 바나나 이미지 버튼 및 배지 스타일 */
        #popup-btn-container {
            position: fixed;
            top: 20px;
            right: 20px;
            cursor: pointer;
            display: inline-block;
            z-index: 2;
        }
        #banana-img {
            width: 50px; 
            height: auto;
            display: block;
            transition: transform 0.1s ease;
        }
        #banana-img:hover {
            transform: scale(1.1); 
        }
        #word-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background-color: #ff3366; 
            color: white;
            font-size: 0.8rem;
            font-weight: bold;
            border-radius: 50%;
            padding: 4px 8px;
            min-width: 15px;
            text-align: center;
            font-family: sans-serif;
        }

        /* 2. 게임 텍스트 창 (한 줄 스트림) */
        #game-window {
            width: 100vw;
            height: 100px;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            margin-top: 50px;
        }
        #game-container {
            white-space: nowrap;
            position: absolute;
            left: 50vw; 
            transform: translateX(0px);
            transition: transform 0.08s ease-out;
        }
        .char-span {
            display: inline-block;
            width: 45px; 
            font-size: 3.5rem;
            font-weight: bold;
            color: #444; 
            text-align: center;
            transition: color 0.08s ease-in-out;
        }

        /* 3. 하단 원숭이 이미지 영역 */
        #monkey-container {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #monkey-img {
            width: 360px;         
            height: 360px;        
            object-fit: contain;  
            image-rendering: pixelated; 
            user-select: none;
        }

        /* 4. 중력 낙하 기본 바나나 오브젝트 */
        .flying-banana {
            position: fixed;
            z-index: 100;
            pointer-events: none;
            image-rendering: pixelated;
            animation: tossAndFall 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }
        @keyframes tossAndFall {
            0% { left: 50%; top: 60vh; transform: translate(-50%, -50%) rotate(0deg); }
            30% { top: var(--peak-y); }
            100% { top: 120vh; left: var(--target-x); transform: translate(-50%, -50%) rotate(var(--target-rot)); }
        }

        /* ========================================================
           ✨ 이스터에그 연출용 CSS 애니메이션 영역 (500px 이상 & 모션 변경)
        ======================================================== */
        
        /* 🚀 [bppc 연출] 가로세로 최소 500px 확보 및 회전 없이 완벽한 직선 비행 */
        .ee-bppc-flying {
            position: fixed;
            width: 550px; height: 550px; /* 500px 이상 스케일업 */
            object-fit: contain;
            z-index: 99;
            pointer-events: none;
            animation: bppcLinearLeft 2.2s linear forwards;
        }
        @keyframes bppcLinearLeft {
            0% { left: 105vw; transform: translateY(-50%); }
            100% { left: -600px; transform: translateY(-50%); } /* 이미지 크기를 감안해 완전히 화면 밖으로 퇴장 */
        }

        /* 🥄 [spoon 연출] 가로세로 최소 500px 확보 및 흔들림 없는 두 번 교차 모션 */
        .ee-spoon-asset {
            position: fixed;
            width: 520px; height: 520px; /* 500px 이상 스케일업 */
            object-fit: contain;
            z-index: 99;
            pointer-events: none;
            top: 50vh; /* 화면 상하 중앙 배치 */
        }
        
        /* 왼쪽 출발 스푼: 화면 밖(-600px) -> 중앙 진입 -> 2번 교차 왕복 -> 우측 화면 밖(105vw) 퇴장 */
        .ee-spoon-left {
            animation: spoonCrossLeft 3.5s ease-in-out forwards;
        }
        @keyframes spoonCrossLeft {
            0%   { left: -600px; transform: translateY(-50%); }
            25%  { left: 35vw;   transform: translateY(-50%); } /* 1차 접근 */
            45%  { left: 20vw;   transform: translateY(-50%); } /* 뒤로 살짝 빠졌다가 */
            65%  { left: 40vw;   transform: translateY(-50%); } /* 2차 교차 돌격 */
            100% { left: 105vw;  transform: translateY(-50%); } /* 우측 화면 밖 탈출 */
        }

        /* 오른쪽 출발 스푼 (좌우반전): 화면 밖(105vw) -> 중앙 진입 -> 2번 교차 왕복 -> 좌측 화면 밖(-600px) 퇴장 */
        .ee-spoon-right {
            animation: spoonCrossRight 3.5s ease-in-out forwards;
        }
        @keyframes spoonCrossRight {
            0%   { left: 105vw;  transform: translateY(-50%) scaleX(-1); }
            25%  { left: 50vw;   transform: translateY(-50%) scaleX(-1); } /* 1차 접근 */
            45%  { left: 65vw;   transform: translateY(-50%) scaleX(-1); } /* 뒤로 빠졌다가 */
            65%  { left: 45vw;   transform: translateY(-50%) scaleX(-1); } /* 2차 교차 돌격 */
            100% { left: -600px; transform: translateY(-50%) scaleX(-1); } /* 좌측 화면 밖 탈출 */
        }

        /* 5. 팝업창(모달) 및 리스트 내부 아이콘 스타일 */
        #word-modal {
            display: none; 
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 320px; max-height: 400px;
            background-color: #111;
            border: 1px solid #333;
            padding: 20px;
            box-shadow: 0 0 20px rgba(255,255,255,0.05);
            z-index: 10;
        }
        #modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        #modal-title { margin: 0; font-size: 1.2rem; color: #fff; }
        #close-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 1.2rem; }
        #close-btn:hover { color: #fff; }
        #word-list {
            list-style: none; padding: 0; margin: 0;
            max-height: 300px; overflow-y: auto;
        }
        #word-list li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0; border-bottom: 1px solid #222;
            font-size: 1.2rem; font-weight: bold;
        }
        .list-ee-icon {
            width: 24px; height: auto;
            object-fit: contain;
            margin-left: 10px;
        }
        #modal-overlay {
            display: none; position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.7); z-index: 5;
        }
    </style>
</head>
<body>

    <div id="popup-btn-container">
        <img id="banana-img" src="image/banana.png" alt="Words Bucket">
        <div id="word-badge">0</div>
    </div>

    <div id="game-window">
        <div id="game-container"></div>
    </div>

    <div id="monkey-container">
        <img id="monkey-img" src="image/monkeystop.png" alt="Typing Monkey">
    </div>

    <div id="modal-overlay"></div>
    <div id="word-modal">
        <div id="modal-header">
            <h3 id="modal-title">Collected Words</h3>
            <button id="close-btn">&times;</button>
        </div>
        <ul id="word-list"></ul>
    </div>

    <script>
        // 사전 데이터베이스
        const wordsString = "ability,able,about,above,accept,according,account,across,action,activity,actually,address,administration,admit,adult,affect,after,again,against,agency,agent,agree,agreement,ahead,allow,almost,alone,along,already,also,although,always,american,among,amount,analysis,animal,another,answer,anyone,anything,appear,apply,approach,area,argue,around,arrive,article,artist,assume,attack,attention,attorney,audience,author,authority,available,avoid,away,baby,back,blood,board,body,book,born,both,break,bring,brother,budget,build,building,business,call,camera,campaign,cancer,candidate,capital,care,career,carry,case,catch,cause,cell,center,central,century,certain,certainly,chair,challenge,chance,change,character,charge,check,child,choice,choose,church,citizen,city,civil,claim,class,clear,clearly,close,coach,cold,collection,college,color,come,commercial,common,community,company,compare,computer,concern,condition,conference,congress,consider,consumer,contain,continue,control,cost,could,country,couple,course,court,cover,create,crime,cultural,culture,current,customer,dark,data,daughter,dead,deal,death,debate,decade,decide,decision,deep,defense,degree,democrat,democratic,describe,design,despite,detail,determine,develop,development,die,difference,different,difficult,dinner,direction,director,discover,discuss,discussion,disease,doctor,door,down,draw,dream,drive,drop,drug,during,each,early,east,easy,edge,education,effect,effort,eight,either,election,else,employee,energy,enjoy,enough,enter,entire,environment,especially,establish,even,evening,event,ever,every,everybody,everyone,everything,evidence,exactly,example,executive,exist,expect,experience,expert,explain,factor,fail,fall,family,fast,father,fear,federal,feel,feeling,field,fight,figure,fill,film,final,finally,financial,find,fine,finger,finish,fire,firm,first,fish,five,floor,focus,follow,food,foot,force,foreign,forget,form,former,forward,four,free,friend,from,front,full,fund,future,game,garden,gas,general,generation,girl,give,glass,goal,good,government,great,green,ground,group,grow,growth,guess,hair,half,hand,hang,happen,happy,hard,have,head,health,hear,heart,heat,heavy,help,here,herself,high,himself,history,hold,hole,home,hope,hospital,hotel,hour,house,huge,human,hundred,husband,idea,identify,image,imagine,impact,important,improve,include,including,increase,indeed,indicate,individual,industry,information,inside,instead,institution,interest,interesting,international,interview,into,investment,involve,issue,item,join,just,keep,kill,kind,know,knowledge,land,language,large,last,late,later,laugh,lawyer,lead,leader,learning,least,leave,left,legal,less,letter,level,life,light,like,likely,line,list,listen,little,live,local,long,look,lose,loss,love,machine,magazine,main,maintain,major,majority,make,manage,management,manager,many,market,marriage,material,matter,maybe,mean,measure,media,medical,meet,meeting,member,member,memory,mention,message,method,middle,might,military,million,mind,minute,miss,mission,model,modern,moment,money,month,more,morning,most,mother,mouth,move,movement,movie,much,music,must,myself,name,nation,national,natural,nature,near,nearly,necessary,need,network,never,news,newspaper,next,nice,night,none,north,note,nothing,notice,number,occur,ocean,offer,office,officer,official,often,once,only,onto,open,operation,opportunity,option,order,organization,other,others,outside,over,owner,page,pain,painting,paper,parent,part,participant,particular,particularly,partner,party,pass,past,patient,pattern,peace,people,perform,performance,perhaps,period,person,personal,phone,physical,pick,picture,piece,place,plan,plant,play,player,point,police,policy,political,politics,poor,popular,population,position,positive,possible,power,practice,prepare,present,president,pressure,price,private,probably,problem,process,produce,product,production,professional,professor,program,project,property,protect,prove,provide,public,pull,purpose,push,quality,question,quickly,quite,race,radio,raise,range,rate,rather,reach,read,ready,real,reality,realize,really,reason,receive,recent,recently,recognize,record,reduce,reflect,region,relate,relationship,religious,remain,remember,remove,report,represent,republican,require,research,resource,respond,response,responsibility,rest,result,return,reveal,rich,right,rise,risk,road,rock,role,room,rule,safe,same,save,scene,school,science,scientist,score,season,seat,second,section,security,seek,seem,sell,send,senior,sense,series,serious,serve,service,set,seven,several,sexual,shake,share,shoot,short,shot,should,shoulder,show,side,sign,significant,similar,simple,simply,since,sing,single,sister,site,situation,size,skill,skin,small,smile,social,society,soldier,some,somebody,someone,something,sometimes,song,soon,sort,sound,source,south,southern,space,speak,special,specific,speech,spend,sport,spring,staff,stage,stand,standard,star,start,state,statement,station,stay,step,still,stock,stop,store,story,strategy,street,strong,structure,student,study,stuff,style,subject,success,successful,such,suddenly,suffer,suggest,summer,support,sure,surface,system,table,take,talk,task,team,technology,television,tell,term,test,than,that,their,them,themselves,then,theory,there,these,they,thing,think,third,this,those,though,thought,thousand,threat,three,through,throughout,throw,thus,time,today,together,tonight,total,tough,toward,town,trade,traditional,training,travel,treat,treatment,tree,trial,trip,trouble,true,truth,turn,type,under,understand,unit,until,upon,usually,value,various,very,victim,view,violence,visit,voice,vote,wait,walk,wall,want,warm,warn,wash,watch,water,wave,weapon,wear,week,weight,well,west,western,whatever,when,where,whether,which,while,white,whole,whom,whose,wide,wife,will,wind,window,wish,with,within,without,woman,wonder,word,work,worker,world,worry,would,write,writer,wrong,yard,yeah,year,young,your,yourself,apple,banana,orange,grape,strawberry,keyboard,mouse,monitor,laptop,screen,software,hardware,internet,website,browser,server,database,network,pixel,coding,logic,function,variable,string,array,object,class,method,error,debug,release,version,update,patch,click,scroll,touch,swipe,zoom,upload,download,search,engine,link,domain,cloud,mobile,battery,photo,video,audio,rhythm,beat,tempo,melody,harmony,chord,vocal,guitar,piano,drum,bass,synth,concert,ticket,crowd,album,track,record,vinyl,studio,microphone,speaker,headphone,broadcast,podcast,stream,live,channel,episode,season,series,actor,actress,director,script,plot,scene,drama,comedy,action,horror,thriller,romance,fantasy,scifi,animation,cartoon,comic,novel,poem,poet,chapter,character,hero,villain,magic,sword,shield,dragon,knight,castle,king,queen,prince,princess,royal,crown,throne,gold,silver,bronze,iron,steel,wood,stone,dirt,sand,plastic,cloth,fabric,cotton,silk,wool,leather,shoe,boot,sock,shirt,pant,dress,skirt,coat,jacket,glove,ring,clock,decade,past,present,future,tomorrow,yesterday,noon,afternoon,midnight,dawn,dusk,moon,planet,earth,mars,jupiter,saturn,galaxy,universe,astronaut,rocket,ship,alien,orbit,gravity,speed,light,color,yellow,purple,pink,brown,black,gray,shape,circle,square,triangle,line,point,volume,mass,tall,short,narrow,deep,shallow,high,cold,warm,cool,hard,soft,rough,smooth,heavy,fast,slow,quick,steady,weak,brave,scared,angry,calm,loud,quiet,deaf,blind,mute,dumb,smart,clever,wise,fool,crazy,sane,sick,awake,sleep,dream,nightmare,pillow,blanket,roof,floor,kitchen,bath,living,dining,yard,grass,leaf,branch,root,flower,seed,fruit,vegetable,meat,beef,pork,bread,cheese,milk,butter,salt,pepper,sugar,spice,sweet,sour,bitter,spicy,taste,smell,sight,sense,brain,lung,stomach,liver,kidney,bone,muscle,nail,face,nose,lip,tooth,tongue,neck,arm,thumb,chest,waist,knee,foot";
        const dictionary = wordsString.split(",").filter(word => word.length >= 3);

        const easterEggs = {
            "bppc": { img: "image/bppcimg.png", color: "#00FF66" },
            "spoon": { img: "image/spoonimg.png", color: "#FF00FF" }
        };

        const flatNeonColors = ['#FF3366', '#33FFCC', '#33CCFF', '#CCFF33', '#FF9933', '#FF33FF'];

        const container = document.getElementById("game-container");
        const popupBtnContainer = document.getElementById("popup-btn-container");
        const wordBadge = document.getElementById("word-badge");
        const modal = document.getElementById("word-modal");
        const overlay = document.getElementById("modal-overlay");
        const closeBtn = document.getElementById("close-btn");
        const wordListElement = document.getElementById("word-list");
        const monkeyImg = document.getElementById("monkey-img");

        let charsData = []; 
        let currentIndex = 0; 
        let collectedWords = []; 
        const charWidth = 45;    

        let currentFrame = 0;
        let monkeyTimer = null;

        let nextEeTriggerCount = Math.floor(Math.random() * 51) + 100; 
        let charCounterSinceLastEe = 0;

        function appendStream(count) {
            let i = 0;
            while (i < count) {
                if (charCounterSinceLastEe >= nextEeTriggerCount) {
                    const eeKeys = Object.keys(easterEggs);
                    const randomEe = eeKeys[Math.floor(Math.random() * eeKeys.length)];
                    
                    for (let char of randomEe) {
                        createSpan(char);
                    }
                    i += randomEe.length;
                    
                    charCounterSinceLastEe = 0;
                    nextEeTriggerCount = Math.floor(Math.random() * 51) + 100; 
                    continue;
                }

                if (Math.random() < 0.15) {
                    let word = dictionary[Math.floor(Math.random() * dictionary.length)];
                    for (let char of word) {
                        createSpan(char);
                    }
                    i += word.length;
                    charCounterSinceLastEe += word.length;
                    continue;
                }

                let randomChar = String.fromCharCode(97 + Math.floor(Math.random() * 26));
                createSpan(randomChar);
                i++;
                charCounterSinceLastEe++;
            }
        }

        function createSpan(char) {
            let span = document.createElement("span");
            span.innerText = char;
            span.className = "char-span";
            container.appendChild(span);
            
            charsData.push({
                char: char,
                element: span,
                colorOverridden: false 
            });
        }

        function launchBanana(wordLength) {
            const flyingBanana = document.createElement("img");
            flyingBanana.src = "image/banana.png";
            flyingBanana.className = "flying-banana";
            
            const bananaSize = 35 + (wordLength * 12); 
            flyingBanana.style.width = `${bananaSize}px`;
            flyingBanana.style.height = "auto";
            
            const targetX = 15 + Math.random() * 70; 
            const peakY = 25 + Math.random() * 15; 
            const targetRot = (Math.random() - 0.5) * 1440; 

            flyingBanana.style.setProperty('--target-x', `${targetX}vw`);
            flyingBanana.style.setProperty('--peak-y', `${peakY}vh`);
            flyingBanana.style.setProperty('--target-rot', `${targetRot}deg`);

            document.body.appendChild(flyingBanana);

            setTimeout(() => {
                flyingBanana.remove();
            }, 1200);
        }

        // ========================================================
        // 🎬 이스터에그 인터랙션 구동 장치 (수정 완료)
        // ========================================================
        function triggerEasterEggInteraction(word) {
            if (word === "bppc") {
                const spawnCount = 7 + Math.floor(Math.random() * 2); 
                for (let k = 0; k < spawnCount; k++) {
                    setTimeout(() => {
                        const img = document.createElement("img");
                        img.src = easterEggs["bppc"].img;
                        img.className = "ee-bppc-flying";
                        // 거대해진 크기를 고려하여 15vh~75vh 사이로 상하 폭 배치 안정화
                        img.style.top = `${15 + Math.random() * 60}vh`;
                        document.body.appendChild(img);

                        // 애니메이션이 끝나 완전히 화면 밖(-600px)으로 나간 시점(2.2초)에 브라우저에서 제거
                        setTimeout(() => img.remove(), 2200); 
                    }, k * 180); // 순차적 돌격감 유지를 위한 스폰 시차
                }
            } 
            else if (word === "spoon") {
                // 🥄 완전히 화면 왼쪽 밖에서 나오는 오리지널 대형 스푼
                const spoonL = document.createElement("img");
                spoonL.src = easterEggs["spoon"].img;
                spoonL.className = "ee-spoon-asset ee-spoon-left";
                document.body.appendChild(spoonL);

                // 🥄 완전히 화면 오른쪽 밖에서 나오는 좌우 반전 대형 스푼
                const spoonR = document.createElement("img");
                spoonR.src = easterEggs["spoon"].img;
                spoonR.className = "ee-spoon-asset ee-spoon-right";
                document.body.appendChild(spoonR);

                // 왕복 교차 댄스 애니메이션 시간(3.5초)이 끝난 후 완전히 화면 밖으로 이탈하면 삭제
                setTimeout(() => {
                    spoonL.remove();
                    spoonR.remove();
                }, 3500);
            }
        }

        function collectWord(word, color, isEE = false) {
            collectedWords.push({ name: word, color: color, isEE: isEE });
            wordBadge.innerText = collectedWords.length; 
            
            const li = document.createElement("li");
            li.style.color = color;

            const textSpan = document.createElement("span");
            textSpan.innerText = word;
            li.appendChild(textSpan);

            if (isEE && easterEggs[word]) {
                const eeIcon = document.createElement("img");
                eeIcon.src = easterEggs[word].img;
                eeIcon.className = "list-ee-icon";
                li.appendChild(eeIcon);
            }
            
            wordListElement.appendChild(li);
        }

        window.addEventListener("keydown", (e) => {
            if (modal.style.display === "block" || currentIndex >= charsData.length) return; 
            if (e.key.length > 1) return; 

            const key = e.key.toLowerCase();
            
            if (key === charsData[currentIndex].char) {
                let currentData = charsData[currentIndex];
                
                if (!currentData.colorOverridden) {
                    currentData.element.style.color = '#ffffff'; 
                }
                
                currentIndex++;
                container.style.transform = `translateX(${-currentIndex * charWidth}px)`;

                clearTimeout(monkeyTimer); 
                
                currentFrame = (currentFrame % 4) + 1; 
                monkeyImg.src = `image/monkeytypo${currentFrame}.png`; 

                monkeyTimer = setTimeout(() => {
                    monkeyImg.src = "image/monkeystop.png";
                    currentFrame = 0; 
                }, 250);

                if (charsData.length - currentIndex < 40) {
                    appendStream(100);
                }
                
                let eeFound = false;
                for (let eeWord in easterEggs) {
                    let len = eeWord.length;
                    if (currentIndex >= len) {
                        let match = true;
                        for (let j = 0; j < len; j++) {
                            if (charsData[currentIndex - len + j].char !== eeWord[j]) {
                                match = false;
                                break;
                            }
                        }
                        if (match) {
                            let chosenColor = easterEggs[eeWord].color;
                            for (let j = 0; j < len; j++) {
                                let targetData = charsData[currentIndex - len + j];
                                targetData.element.style.color = chosenColor;
                                targetData.colorOverridden = true; 
                            }
                            
                            triggerEasterEggInteraction(eeWord);
                            launchBanana(len); 
                            collectWord(eeWord, chosenColor, true);
                            eeFound = true;
                            break;
                        }
                    }
                }

                if (!eeFound) {
                    for (let word of dictionary) {
                        let len = word.length;
                        
                        if (currentIndex >= len) {
                            let match = true;
                            for (let j = 0; j < len; j++) {
                                if (charsData[currentIndex - len + j].char !== word[j]) {
                                    match = false;
                                    break;
                                }
                            }
                            
                            if (match) {
                                let chosenColor = flatNeonColors[Math.floor(Math.random() * flatNeonColors.length)];
                                
                                for (let j = 0; j < len; j++) {
                                    let targetData = charsData[currentIndex - len + j];
                                    targetData.element.style.color = chosenColor;
                                    targetData.colorOverridden = true; 
                                }
                                
                                launchBanana(len);
                                collectWord(word, chosenColor, false);
                                break; 
                            }
                        }
                    }
                }
            }
        });

        popupBtnContainer.addEventListener("click", () => {
            modal.style.display = "block";
            overlay.style.display = "block";
        });

        function closeModal() {
            modal.style.display = "none";
            overlay.style.display = "none";
        }
        closeBtn.addEventListener("click", closeModal);
        overlay.addEventListener("click", closeModal);

        appendStream(100);
    </script>
</body>
</html>
